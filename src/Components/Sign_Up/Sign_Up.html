<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StayHealthy</title>
    <link rel="stylesheet" href="./Sign_Up.css">
    <link rel="stylesheet" href="../Navbar/Navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <nav>
        <div class="nav__logo"><a href="/">StayHealthy</a><span>.</span></div>
        <div class="nav__icon" onclick="handleClick()"><i class="fa fa-bars"></i></div>
        <ul class="nav__links active">
            <li class="link"><a href="../Landing_Page/LandingPage.html">Home</a></li>
            <li class="link"><a href="#">Appointments</a></li>
            <li class="link"><a href="../Sign_Up/Sign_Up.html"><button class="btn1">Sign Up</button></a></li>
            <li class="link"><a href="../Login/Login.html"><button class="btn1">Login</button></a></li>
        </ul>
    </nav>
    <div class="container" style="margin-top: 5%;">
        <div class="signup-grid">
            <div class="signup-text"><h1>Sign Up</h1></div>
            <div class="signup-text1" style="text-align: left;">
                Already a member? <span><a href="../Login/Login.html" style="color: #2190FF;">Login</a></span>
            </div>
            <div class="signup-form">
                <form>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <select name="role" id="role" required class="form-control">
                            <option value="" disabled selected>Select your role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name" required class="form-control" placeholder="Enter your name" />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" name="phone" id="phone" required class="form-control" placeholder="Enter your phone number" />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required class="form-control" placeholder="Enter your email" />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" required class="form-control" placeholder="Enter your password" />
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Submit</button>
                        <button type="reset" class="btn btn-danger">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function handleClick() {
            const navLinks = document.querySelector(".nav__links");
            const navIcon = document.querySelector(".nav__icon i");
            navLinks.classList.toggle("active");
            if (navLinks.classList.contains("active")) {
                navIcon.classList.remove("fa-bars");
                navIcon.classList.add("fa-times");
            } else {
                navIcon.classList.remove("fa-times");
                navIcon.classList.add("fa-bars");
            }
        }
    </script>
</body>
</html>
